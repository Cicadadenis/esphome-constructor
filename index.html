<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ESPHome Конструктор v11 – 2026</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-okaidia.min.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  
  <style>
    :root {
      --primary: #60a5fa;
      --primary-dark: #3b82f6;
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
      --gray: #94a3b8;
      --border: #334155;
      --danger: #f87171;
      --success: #34d399;
    }
    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: var(--text);
      margin: 0;
      padding: 16px;
      min-height: 100vh;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { text-align: center; color: var(--primary); margin: 24px 0 8px; font-size: 2.4rem; text-shadow: 0 2px 10px rgba(59,130,246,0.3); }
    h2 { color: #cbd5e1; margin: 32px 0 16px; font-size: 1.6rem; }
    .subtitle { text-align: center; color: var(--gray); margin-bottom: 40px; font-size: 1.2rem; }
    .card {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      padding: 24px;
      margin-bottom: 32px;
      transition: transform 0.2s;
    }
    .card:hover { transform: translateY(-4px); }
    label { display: block; margin: 16px 0 8px; font-weight: 500; font-size: 1.1rem; color: #cbd5e1; }
    input, select, textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 1.05rem;
      background: #0f172a;
      color: var(--text);
      box-sizing: border-box;
    }
    input[type="checkbox"] {
      width: auto;
      margin-right: 8px;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 3px rgba(96,165,250,0.2);
    }
    .actions {
      text-align: center;
      margin: 40px 0;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }
    button {
      padding: 16px 40px;
      font-size: 1.15rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      min-width: 220px;
    }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
    .btn-flash { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(59,130,246,0.4); }
    .btn-secondary { background: #475569; color: white; }
    pre {
      background: #020617;
      color: #c7d2fe;
      padding: 24px;
      border-radius: 12px;
      overflow-x: auto;
      font-size: 0.95rem;
      margin-top: 20px;
      border: 1px solid #334155;
    }
    .assigned-item {
      background: #334155;
      border-radius: 12px;
      padding: 14px 18px;
      margin: 12px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1rem;
      border-left: 4px solid var(--primary);
    }
    .remove-btn {
      background: var(--danger);
      color: white;
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      cursor: pointer;
      font-size: 20px;
    }
    #mqttFields { display: none; }
    @media (max-width: 768px) {
      button { min-width: 100%; padding: 18px; }
      .actions { flex-direction: column; gap: 16px; }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>ESPHome Конструктор v11</h1>
  <h2 style="text-align:center; color:#94a3b8;">꧁༺𝓒𝓲𝓬𝓪𝓭𝓪3301༻꧂</h2>
  <p class="subtitle">Датчики 27 шт</p>

  <div class="card">
    <h2>Основные настройки</h2>
    <label>Имя устройства (маленькими буквами, без пробелов) *</label>
    <input type="text" id="devName" value="" />

    <label>Плата</label>
    <select id="board" onchange="updatePins()">
      <option value="nodemcuv2" selected>NodeMCU v2 (ESP8266)</option>
      <option value="d1_mini">Wemos D1 mini</option>
      <option value="esp32dev" data-esp32="true">ESP32 DevKit</option>
    </select>

    <label>Wi-Fi SSID *</label>
    <input type="text" id="ssid" value="" />

    <label>Wi-Fi Пароль *</label>
    <input type="password" id="wifiPass" value="" />

    <label>Пароль OTA *</label>
    <input type="text" id="otaPass" value="" />

    <label style="margin-top: 20px; display: flex; align-items: center; cursor: pointer;">
      <input type="checkbox" id="useMqtt" onchange="toggleMqttFields()">
      Использовать MQTT (Home Assistant, Node-RED и т.д.)
    </label>

    <div id="mqttFields">
      <label>MQTT Host (IP или домен брокера) *</label>
      <input type="text" id="mqttHost" value="" placeholder="192.168.1.100 или broker.hivemq.com" />

      <label>MQTT Порт (обычно 1883)</label>
      <input type="text" id="mqttPort" value="1883" />

      <label>MQTT Логин *</label>
      <input type="text" id="mqttUsername" value="" />

      <label>MQTT Пароль *</label>
      <input type="password" id="mqttPassword" value="" />
    </div>
  </div>

  <div class="card">
    <h2>Добавить датчик</h2>
    <label>Тип датчика</label>
    <select id="compType"></select>

    <label>Пин</label>
    <select id="pinSelect"></select>

    <button class="btn-primary" onclick="addComponent()" style="margin-top:20px; width:100%;">Добавить</button>
  </div>

  <div class="card">
    <h2>Назначенные датчики</h2>
    <div id="assigned"></div>
  </div>

  <div class="actions">
    <button class="btn-primary" onclick="generate()">Сгенерировать YAML</button>
    <button class="btn-secondary" onclick="download()">Скачать YAML</button>
    <button id="flashBtn" class="btn-flash" onclick="flashBoard()">Прошить через браузер</button>
  </div>

  <div class="card" id="yamlCard" style="display:none;">
    <h2>Готовый YAML</h2>
    <pre><code id="yaml" class="language-yaml"></code></pre>
  </div>
</div>

<script>
// Показать/скрыть поля MQTT
function toggleMqttFields() {
  const useMqtt = document.getElementById("useMqtt");
  const mqttFields = document.getElementById("mqttFields");
  mqttFields.style.display = useMqtt.checked ? "block" : "none";
}

// Список датчиков
const components = [
  {name:"Реле / Выключатель", type:"relay", icon:"power-socket-eu"},
  {name:"MQ-4 Метан (ADC)", type:"mq4", icon:"gas-cylinder"},
  {name:"MQ-135 Воздух (ADC)", type:"mq135", icon:"air-filter"},
  {name:"DHT22 Темп+Влажность", type:"dht22", icon:"home-thermometer"},
  {name:"BME280 Темп+Вл+Давление", type:"bme280", icon:"weather-partly-snowy"},
  {name:"BMP280 Давление+Темп", type:"bmp280", icon:"gauge"},
  {name:"DS18B20 Температура", type:"ds18b20", icon:"thermometer"},
  {name:"BH1750 Освещенность", type:"bh1750", icon:"white-balance-sunny"},
  {name:"SCD40/SCD41 CO₂", type:"scd4x", icon:"molecule-co2"},
  {name:"MH-Z19 CO₂", type:"mhz19", icon:"molecule-co2"},
  {name:"PMSx003 PM2.5/PM10", type:"pmsx003", icon:"weather-dust"},
  {name:"PIR Движение", type:"pir", icon:"walk"},
  {name:"Кнопка", type:"button", icon:"gesture-tap"},
  {name:"Влажность почвы", type:"soil", icon:"water"},
  {name:"HC-SR04 Расстояние", type:"ultrasonic", icon:"ruler"},
  {name:"LED PWM (димер)", type:"pwmled", icon:"lightbulb-outline"},
  {name:"WS2812B Адресная лента", type:"ws2812", icon:"led-strip"},
  {name:"INA219 Ток+Напряжение", type:"ina219", icon:"current-ac"},
  {name:"Дверной/магнитный", type:"door", icon:"door"},
  {name:"Вибрация / Наклон", type:"vibration", icon:"vibrate"},
  {name:"MAX30102 Пульс + SpO2", type:"max30102", icon:"heart-pulse"},
  {name:"VL53L0X Расстояние (ToF)", type:"vl53l0x", icon:"ruler"},
  {name:"SHT3x Темп+Влажность", type:"sht3x", icon:"water-percent"},
  {name:"CCS811 VOC + eCO2", type:"ccs811", icon:"air-filter"},
  {name:"HDC2010 Темп+Влажность", type:"hdc2010", icon:"thermometer-lines"},
  {name:"MCP3221 ADC", type:"mcp3221", icon:"current-dc"},
  {name:"AQI с PM", type:"aqi", icon:"air-quality"}
];

let assigned = [];
let currentPins = [];

const compSelect = document.getElementById("compType");
components.forEach(c => {
  const opt = document.createElement("option");
  opt.value = c.type;
  opt.innerHTML = `<span class="mdi mdi-${c.icon}"></span> ${c.name}`;
  compSelect.add(opt);
});

const pinMapping = {
  "GPIO0":  "GPIO0 (D3)",
  "GPIO2":  "GPIO2 (D4)",
  "GPIO4":  "GPIO4 (D2)",
  "GPIO5":  "GPIO5 (D1)",
  "GPIO12": "GPIO12 (D6)",
  "GPIO13": "GPIO13 (D7)",
  "GPIO14": "GPIO14 (D5)",
  "GPIO15": "GPIO15 (D8)",
  "GPIO16": "GPIO16 (D0)",
  "GPIO17": "GPIO17 (A0)"
};

function updatePins() {
  const board = document.getElementById("board").value;
  const isESP32 = document.querySelector(`#board option[value="${board}"]`).dataset.esp32 === "true";

  let raw = isESP32
    ? ["GPIO4","GPIO5","GPIO18","GPIO19","GPIO21","GPIO22","GPIO23","GPIO25","GPIO26","GPIO27","GPIO32","GPIO33","GPIO34","GPIO35","GPIO36","GPIO39"]
    : ["GPIO0","GPIO2","GPIO4","GPIO5","GPIO12","GPIO13","GPIO14","GPIO15","GPIO16","GPIO17"];

  currentPins = raw.map(g => ({
    gpio: g,
    display: isESP32 ? g : (pinMapping[g] || g)
  }));

  refreshPinDropdown();
}

function refreshPinDropdown() {
  const sel = document.getElementById("pinSelect");
  sel.innerHTML = "";
  currentPins.filter(p => !assigned.some(a => a.pin === p.gpio)).forEach(p => {
    const opt = document.createElement("option");
    opt.value = p.gpio;
    opt.textContent = p.display;
    sel.add(opt);
  });
}

updatePins();

function addComponent() {
  const type = document.getElementById("compType").value;
  const opt = document.getElementById("pinSelect").selectedOptions[0];
  if (!opt) return alert("Выберите пин!");

  const gpio = opt.value;
  const display = opt.textContent;
  const name = components.find(c => c.type === type).name;

  assigned.push({name, type, pin: gpio, display});
  renderAssigned();
  refreshPinDropdown();
}

function renderAssigned() {
  const cont = document.getElementById("assigned");
  cont.innerHTML = "";
  assigned.forEach((item, i) => {
    const div = document.createElement("div");
    div.className = "assigned-item";
    div.innerHTML = `${item.name} → ${item.display} <button class="remove-btn" onclick="removeComp(${i})">×</button>`;
    cont.appendChild(div);
  });
}

function removeComp(i) {
  assigned.splice(i, 1);
  renderAssigned();
  refreshPinDropdown();
}

function generateApiKey() {
  const array = new Uint8Array(32);
  crypto.getRandomValues(array);
  return btoa(String.fromCharCode(...array));
}

function generate() {
  const devName     = document.getElementById("devName").value.trim();
  const ssid        = document.getElementById("ssid").value.trim();
  const wifiPass    = document.getElementById("wifiPass").value.trim();
  const otaPass     = document.getElementById("otaPass").value.trim();
  const useMqtt     = document.getElementById("useMqtt").checked;
  const mqttHost    = document.getElementById("mqttHost").value.trim();
  const mqttPort    = document.getElementById("mqttPort").value.trim() || "1883";
  const mqttUser    = document.getElementById("mqttUsername").value.trim();
  const mqttPass    = document.getElementById("mqttPassword").value.trim();

  let errorMsg = "";

  if (!devName)    errorMsg += "• Имя устройства не заполнено\n";
  if (!ssid)       errorMsg += "• Wi-Fi SSID не заполнен\n";
  if (!wifiPass)   errorMsg += "• Wi-Fi пароль не заполнен\n";
  if (!otaPass)    errorMsg += "• Пароль OTA не заполнен\n";

  if (useMqtt) {
    if (!mqttHost) errorMsg += "• MQTT Host не заполнен\n";
    if (!mqttUser) errorMsg += "• MQTT Логин не заполнен\n";
    if (!mqttPass) errorMsg += "• MQTT Пароль не заполнен\n";
  }

  if (errorMsg) {
    alert("Не все обязательные поля заполнены!\n\n" + errorMsg);
    return;
  }

  const name = devName;
  const board = document.getElementById("board").value;
  const isESP32 = document.querySelector(`#board option[value="${board}"]`).dataset.esp32 === "true";

  const apiEncryptionKey = generateApiKey();

  let yaml = `esphome:
  name: ${name}
  friendly_name: ${name}

${isESP32 ? "esp32:" : "esp8266:"}
  board: ${board}

wifi:
  ssid: "${ssid}"
  password: "${wifiPass}"
  min_auth_mode: WPA2

  ap:
    ssid: "${name} Fallback"
    password: "88888888"

logger:
api:
  encryption:
    key: "${apiEncryptionKey}"
ota:
  - platform: esphome
    password: "${otaPass}"

web_server:
  port: 80
`;

  if (useMqtt) {
    yaml += `
mqtt:
  broker: ${mqttHost}
  port: ${mqttPort}
  username: "${mqttUser}"
  password: "${mqttPass}"
  id: mqtt_client
  discovery: true
`;
  }

  // Добавляем все датчики из assigned
  assigned.forEach(c => {
    const p = c.pin;
    let section = '';

    switch(c.type) {
      case "relay":
        section = `switch:\n  - platform: gpio\n    pin: ${p}\n    name: "${c.name}"\n`;
        break;

      case "door":
        section = `binary_sensor:\n  - platform: gpio\n    pin: ${p}\n    name: "${c.name}"\n    device_class: door\n`;
        break;

      case "water_leak":
        section = `binary_sensor:\n  - platform: gpio\n    pin: ${p}\n    name: "${c.name}"\n    device_class: moisture\n`;
        break;

      case "button":
        section = `binary_sensor:\n  - platform: gpio\n    pin: ${p}\n    name: "${c.name}"\n    device_class: power\n`;
        break;

      case "pir":
        section = `binary_sensor:\n  - platform: gpio\n    pin: ${p}\n    name: "${c.name}"\n    device_class: motion\n`;
        break;

      case "mq2":
      case "mq4":
      case "mq135":
        section = `sensor:\n  - platform: adc\n    pin: ${p}\n    name: "${c.name}"\n    update_interval: 10s\n`;
        break;

      default:
        // Для всех остальных — sensor с платформой по типу
        section = `sensor:\n  - platform: ${c.type}\n    name: "${c.name}"\n`;
        break;
    }

    if (section) {
      yaml += `\n${section}`;
    }
  });

  const code = document.getElementById("yaml");
  code.textContent = yaml;
  document.getElementById("yamlCard").style.display = "block";
  Prism.highlightElement(code);
}

function flashBoard() {
  const yamlText = document.getElementById("yaml").textContent;
  if (!yamlText) {
    alert("Сначала сгенерируйте YAML!");
    return;
  }

  window.open("https://web.esphome.io/", "_blank");
  alert("Открыт веб-флешер ESPHome.\n\n1. Подключите плату по USB\n2. Нажмите «Connect»\n3. Выберите устройство\n4. Вставьте сгенерированный YAML в редактор\n5. Нажмите «Install»");
}

function download() {
  const yaml = document.getElementById("yaml").textContent;
  if (!yaml) return alert("Сначала сгенерируйте YAML");
  const blob = new Blob([yaml], {type:"text/yaml"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = (document.getElementById("devName").value.trim() || "device") + ".yaml";
  a.click();
  URL.revokeObjectURL(url);
}
</script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">
</body>
</html>
